[bria]

# cron source -> file sink (memory state)
[global]
tmp_dir = "/tmp/bria"

[bria.global.log]
level = "info"
format = "json"

[bria.global.state]
backend = "memory"

[bria.server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"

[[bria.sources]]
id = "ticker"
type = "cron"
schedule = "*/1 * * * * *"
tz = "UTC"

[bria.sources.payload]
message = "cron-tick"

[[bria.tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"input\":\"%s\",\"pipeline\":\"%s\"}' \"$1\" \"$PIPELINE_ID\"", "sh", "{{job.payload.message}}"]
timeout_secs = 10

[bria.tasks.stdout]
mode = "capture"
max_bytes = 4096

[bria.tasks.stderr]
mode = "capture"
max_bytes = 4096

[[bria.sinks]]
id = "file-out"
type = "file"
path = "/tmp/bria/results.jsonl"

[[bria.pipelines]]
id = "cron-file-pipeline"
source = "ticker"
sinks = ["file-out"]

[[bria.pipelines.steps]]
id = "run"
type = "process"
task = "echo"
