# http source (tiny max_body_bytes) -> file sink: 413 Payload Too Large test
[global]
tmp_dir = "/tmp/bria"

[global.log]
level = "info"
format = "json"

[global.state]
backend = "memory"

[server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"
api_key = "${BRIA_API_KEY}"

[[sources]]
id = "api"
type = "http"
path = "jobs"
id_field = "id"
max_body_bytes = 10

[[tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"ok\":true}'"]
timeout_secs = 10

[tasks.stdout]
mode = "capture"
max_bytes = 4096

[tasks.stderr]
mode = "capture"
max_bytes = 4096

[[sinks]]
id = "file-out"
type = "file"
path = "/tmp/bria/results.jsonl"

[[pipelines]]
id = "http-413-pipeline"
source = "api"
sinks = ["file-out"]

[[pipelines.steps]]
id = "run"
type = "process"
task = "echo"
