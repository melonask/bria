version = 1

[bria]

# http source -> file sink: task exits non-zero (failure path test)
[runtime]
tmp_dir = "/tmp/bria"

[bria.global.log]
level = "info"
format = "json"

[bria.global.state]
backend = "memory"

[bria.server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"
api_key = "${BRIA_API_KEY}"

[[bria.sources]]
id = "api"
type = "http"
path = "jobs"
id_field = "id"
max_body_bytes = 1048576

[[bria.tasks]]
id = "failer"
driver = "local"
cmd = "sh"
args = ["-c", "echo 'this task fails on purpose' >&2; exit 42"]
timeout_secs = 10

[bria.tasks.stdout]
mode = "capture"
max_bytes = 4096

[bria.tasks.stderr]
mode = "capture"
max_bytes = 4096

[[bria.sinks]]
id = "file-out"
type = "file"
path = "/tmp/bria/results.jsonl"

[[bria.pipelines]]
id = "http-nonzero-pipeline"
source = "api"
sinks = ["file-out"]

[[bria.pipelines.steps]]
id = "run"
type = "process"
task = "failer"
