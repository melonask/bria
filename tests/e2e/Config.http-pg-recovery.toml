# http source -> file sink: verifies PG state recovery re-runs in-flight jobs after restart
[global]
tmp_dir = "/tmp/bria"

[global.log]
level = "info"
format = "json"

[global.state]
backend = "pg"
pg_url = "${BRIA_E2E_PG_URL}"

[server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"
api_key = "${BRIA_API_KEY}"

[[sources]]
id = "api"
type = "http"
path = "jobs"
id_field = "id"
max_body_bytes = 1048576

[[tasks]]
id = "recoverable"
driver = "local"
cmd = "sh"
args = ["-c", "sleep 3; printf 'recovered:%s' '{{ job.payload.message }}'"]
timeout_secs = 10

[tasks.stdout]
mode = "capture"
max_bytes = 4096

[tasks.stderr]
mode = "capture"
max_bytes = 4096

[[sinks]]
id = "file-out"
type = "file"
path = "/tmp/bria/results.jsonl"

[[pipelines]]
id = "http-pg-recovery-pipeline"
source = "api"
sinks = ["file-out"]

[[pipelines.steps]]
id = "run"
type = "process"
task = "recoverable"
