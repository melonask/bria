[bria]

# http source -> queue (AMQP/RabbitMQ) sink (memory state)
[global]
tmp_dir = "/tmp/bria"

[bria.global.log]
level = "info"
format = "json"

[bria.global.state]
backend = "memory"

[bria.server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"
api_key = "${BRIA_API_KEY}"

[[bria.sources]]
id = "api"
type = "http"
path = "jobs"
id_field = "id"
max_body_bytes = 1048576

[[bria.tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"input\":\"%s\",\"pipeline\":\"%s\"}' \"$1\" \"$PIPELINE_ID\"", "sh", "{{job.payload.message}}"]
timeout_secs = 10

[bria.tasks.stdout]
mode = "capture"
max_bytes = 4096

[bria.tasks.stderr]
mode = "capture"
max_bytes = 4096

[[bria.sinks]]
id = "queue-out"
type = "queue"
url = "${BRIA_E2E_AMQP_URL}"
exchange = "bria"
success_routing_key = "result.success"
failure_routing_key = "result.failure"

[[bria.pipelines]]
id = "http-queue-pipeline"
source = "api"
sinks = ["queue-out"]

[[bria.pipelines.steps]]
id = "run"
type = "process"
task = "echo"
