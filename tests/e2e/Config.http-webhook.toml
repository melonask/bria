# http source -> webhook sink (memory state)
[global]
tmp_dir = "/tmp/bria"

[global.log]
level = "info"
format = "json"

[global.state]
backend = "memory"

[server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"
api_key = "${BRIA_API_KEY}"

[[sources]]
id = "api"
type = "http"
path = "jobs"
id_field = "id"
max_body_bytes = 1048576

[[tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"input\":\"%s\",\"pipeline\":\"%s\"}' \"$1\" \"$PIPELINE_ID\"", "sh", "{{job.payload.message}}"]
timeout_secs = 10

[tasks.stdout]
mode = "capture"
max_bytes = 4096

[tasks.stderr]
mode = "capture"
max_bytes = 4096

[[sinks]]
id = "webhook-out"
type = "webhook"
url = "http://webhook-echo:8080/results"
secret = "${BRIA_E2E_WEBHOOK_SECRET}"
signature_header = "X-Bria-Signature"

[[pipelines]]
id = "http-webhook-pipeline"
source = "api"
sinks = ["webhook-out"]

[[pipelines.steps]]
id = "run"
type = "process"
task = "echo"
