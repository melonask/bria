version = 1

[bria]

# pg source -> pg sink + pg state
[runtime]
tmp_dir = "/tmp/bria"

[bria.global.log]
level = "info"
format = "json"

[bria.global.state]
backend = "pg"
pg_url = "${BRIA_E2E_PG_URL}"

[bria.server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"

[[bria.sources]]
id = "pg-in"
type = "pg"
url = "${BRIA_E2E_PG_URL}"
poll_interval_secs = 2
id_field = "id"

[bria.sources.table]
name = "bria_jobs"

[[bria.tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"input\":\"%s\",\"pipeline\":\"%s\"}' \"$1\" \"$PIPELINE_ID\"", "sh", "{{job.payload.message}}"]
timeout_secs = 10

[bria.tasks.stdout]
mode = "capture"
max_bytes = 4096

[bria.tasks.stderr]
mode = "capture"
max_bytes = 4096

[[bria.sinks]]
id = "pg-out"
type = "pg"
url = "${BRIA_E2E_PG_URL}"

[bria.sinks.table]
name = "bria_results"

[[bria.pipelines]]
id = "pg-pg-pipeline"
source = "pg-in"
sinks = ["pg-out"]

[[bria.pipelines.steps]]
id = "run"
type = "process"
task = "echo"
