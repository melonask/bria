# pg source -> pg sink + pg state
[global]
tmp_dir = "/tmp/bria"

[global.log]
level = "info"
format = "json"

[global.state]
backend = "pg"
pg_url = "${BRIA_E2E_PG_URL}"

[server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"

[[sources]]
id = "pg-in"
type = "pg"
url = "${BRIA_E2E_PG_URL}"
poll_interval_secs = 2
id_field = "id"

[sources.table]
name = "bria_jobs"

[[tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"input\":\"%s\",\"pipeline\":\"%s\"}' \"$1\" \"$PIPELINE_ID\"", "sh", "{{job.payload.message}}"]
timeout_secs = 10

[tasks.stdout]
mode = "capture"
max_bytes = 4096

[tasks.stderr]
mode = "capture"
max_bytes = 4096

[[sinks]]
id = "pg-out"
type = "pg"
url = "${BRIA_E2E_PG_URL}"

[sinks.table]
name = "bria_results"

[[pipelines]]
id = "pg-pg-pipeline"
source = "pg-in"
sinks = ["pg-out"]

[[pipelines.steps]]
id = "run"
type = "process"
task = "echo"
