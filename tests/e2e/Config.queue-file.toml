version = 1

[bria]

# queue (AMQP/RabbitMQ) source -> file sink (memory state)
[runtime]
tmp_dir = "/tmp/bria"

[bria.global.log]
level = "info"
format = "json"

[bria.global.state]
backend = "memory"

[bria.server]
enabled = true
bind = "0.0.0.0"
port = 4000
prefix = "v1"

[[bria.sources]]
id = "queue-in"
type = "queue"
url = "${BRIA_E2E_AMQP_URL}"
exchange = "bria"
submit_routing_key = "job.submit"
cancel_routing_key = "job.cancel"
id_field = "id"

[[bria.tasks]]
id = "echo"
driver = "local"
cmd = "sh"
args = ["-c", "printf '{\"input\":\"%s\",\"pipeline\":\"%s\"}' \"$1\" \"$PIPELINE_ID\"", "sh", "{{job.payload.message}}"]
timeout_secs = 10

[bria.tasks.stdout]
mode = "capture"
max_bytes = 4096

[bria.tasks.stderr]
mode = "capture"
max_bytes = 4096

[[bria.sinks]]
id = "file-out"
type = "file"
path = "/tmp/bria/results.jsonl"

[[bria.pipelines]]
id = "queue-file-pipeline"
source = "queue-in"
sinks = ["file-out"]

[[bria.pipelines.steps]]
id = "run"
type = "process"
task = "echo"
