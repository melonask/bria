services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: bria
      POSTGRES_USER: bria
      POSTGRES_PASSWORD: bria
    ports:
      - "54328:5432"
    configs:
      - source: postgres_init_sql
        target: /docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bria -d bria"]
      interval: 2s
      timeout: 5s
      retries: 30

  rabbitmq:
    image: rabbitmq:4-alpine
    environment:
      RABBITMQ_DEFAULT_USER: bria
      RABBITMQ_DEFAULT_PASS: bria
      RABBITMQ_ERLANG_COOKIE: bria-e2e-cookie
    ports:
      - "5672:5672"
    configs:
      - source: rabbitmq_conf
        target: /etc/rabbitmq/conf.d/99-e2e.conf
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  webhook-echo:
    image: python:3-alpine
    command: ["python3", "-u", "/scripts/webhook-echo.py", "8080"]
    configs:
      - source: webhook_echo_py
        target: /scripts/webhook-echo.py
        mode: 0755
    ports:
      - "8080:8080"

  amqp-helper:
    image: python:3-alpine
    command:
      - sh
      - -c
      - "pip install -q pika && trap 'exit 0' TERM; touch /tmp/ready; while true; do sleep 3600; done"
    depends_on:
      rabbitmq:
        condition: service_healthy
    configs:
      - source: amqp_helper_py
        target: /scripts/amqp-helper.py
        mode: 0755
    environment:
      AMQP_URL: ${BRIA_E2E_AMQP_HELPER_URL:-amqp://bria:bria@rabbitmq:5672/%2F}
    healthcheck:
      test: ["CMD-SHELL", "cat /tmp/ready"]
      interval: 2s
      timeout: 5s
      retries: 30

  bria:
    image: bria:e2e
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BRIA_API_KEY: ${BRIA_API_KEY:-e2e-secret}
      BRIA_E2E_AMQP_URL: ${BRIA_E2E_AMQP_URL:-amqp://bria:bria@rabbitmq:5672}
      BRIA_E2E_PG_URL: ${BRIA_E2E_PG_URL:-postgres://bria:bria@postgres:5432/bria}
      BRIA_E2E_WEBHOOK_SECRET: ${BRIA_E2E_WEBHOOK_SECRET:-test-secret-42}
    ports:
      - "4000:4000"
    volumes:
      - ./Config.toml:/etc/bria/Config.toml:ro
      - ./tmp/bria:/tmp/bria
    healthcheck:
      test: ["CMD-SHELL", "bria ping | grep -q pong"]
      interval: 2s
      timeout: 5s
      retries: 30

configs:
  rabbitmq_conf:
    content: |
      deprecated_features.permit.transient_nonexcl_queues = true

  postgres_init_sql:
    content: |
      CREATE TABLE IF NOT EXISTS bria_results (
          result_id   TEXT PRIMARY KEY,
          job_id      TEXT NOT NULL,
          pipeline_id TEXT NOT NULL,
          step_id     TEXT NOT NULL,
          occurred_at TEXT NOT NULL,
          exit_code   INTEGER NOT NULL,
          stdout      TEXT,
          stderr      TEXT,
          duration_ms BIGINT NOT NULL,
          attempt     INTEGER NOT NULL,
          status      TEXT NOT NULL
      );

      CREATE TABLE IF NOT EXISTS bria_jobs (
          id          TEXT PRIMARY KEY,
          payload     TEXT NOT NULL DEFAULT '{}',
          status      TEXT,
          created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
      );

  webhook_echo_py:
    content: |
      import json
      import sys
      from http.server import HTTPServer, BaseHTTPRequestHandler

      class Handler(BaseHTTPRequestHandler):
          def do_POST(self):
              length = int(self.headers.get("content-length", "0"))
              body = self.rfile.read(length) if length > 0 else b""
              entry = {
                  "path": self.path,
                  "method": "POST",
                  "headers": dict(self.headers),
                  "body": body.decode("utf-8", errors="replace"),
              }
              self.send_response(200)
              self.end_headers()
              self.wfile.write(b'{"status":"ok"}\n')
              print(json.dumps(entry), flush=True)

          def do_GET(self):
              self.send_response(200)
              self.end_headers()
              self.wfile.write(b'{"requests":[]}\n')

      if __name__ == "__main__":
          port = int(sys.argv[1]) if len(sys.argv) > 1 else 8080
          print(f"webhook-echo listening on :{port}", flush=True)
          HTTPServer(("0.0.0.0", port), Handler).serve_forever()

  amqp_helper_py:
    content: |
      import json
      import sys
      import os
      import time

      import pika

      URL = os.environ.get("AMQP_URL", "amqp://bria:bria@rabbitmq:5672/%2F")

      def get_connection(retries=10, delay=1):
          for i in range(retries):
              try:
                  return pika.BlockingConnection(pika.URLParameters(URL))
              except Exception as e:
                  if i == retries - 1:
                      raise
                  time.sleep(delay)

      def publish(exchange, routing_key, body):
          conn = get_connection()
          ch = conn.channel()
          # bria already declared the exchange; try matching durable, fallback to skip
          for durable in (False, True):
              try:
                  ch.exchange_declare(exchange=exchange, exchange_type="topic", durable=durable)
                  break
              except Exception:
                  if durable:
                      ch = conn.channel()
                  continue
          props = pika.BasicProperties(content_type="application/json", delivery_mode=2)
          ch.basic_publish(exchange=exchange, routing_key=routing_key, body=body, properties=props)
          conn.close()
          print(json.dumps({"status": "published", "exchange": exchange, "routing_key": routing_key}), flush=True)

      def consume(exchange, routing_key, timeout_secs=15):
          conn = get_connection()
          ch = conn.channel()
          for durable in (False, True):
              try:
                  ch.exchange_declare(exchange=exchange, exchange_type="topic", durable=durable)
                  break
              except Exception:
                  if durable:
                      ch = conn.channel()
                  continue
          result = ch.queue_declare(queue="", exclusive=True, auto_delete=True)
          queue_name = result.method.queue
          ch.queue_bind(queue=queue_name, exchange=exchange, routing_key=routing_key)
          messages = []

          def on_message(ch, method, properties, body):
              messages.append({"routing_key": method.routing_key, "body": body.decode()})
              ch.stop_consuming()

          ch.basic_consume(queue=queue_name, on_message_callback=on_message, auto_ack=True)
          try:
              conn.call_later(timeout_secs, lambda: ch.stop_consuming() if ch.is_open else None)
              ch.start_consuming()
          except Exception:
              pass
          conn.close()
          print(json.dumps(messages), flush=True)

      if __name__ == "__main__":
          cmd = sys.argv[1]
          if cmd == "publish":
              publish(sys.argv[2], sys.argv[3], sys.stdin.read())
          elif cmd == "consume":
              timeout = int(sys.argv[4]) if len(sys.argv) > 4 else 15
              consume(sys.argv[2], sys.argv[3], timeout)
          else:
              print(json.dumps({"error": f"unknown command: {cmd}"}), flush=True)
              sys.exit(1)
